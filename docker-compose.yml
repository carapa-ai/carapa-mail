services:
  carapamail:
    build: .
    image: carapamail:latest
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${SMTP_PORT:-2525}:${SMTP_PORT:-2525}"
      - "${IMAP_PROXY_PORT:-1993}:${IMAP_PROXY_PORT:-1993}"
      - "${HTTP_PORT:-3200}:${HTTP_PORT:-3200}"
      - "127.0.0.1:${MCP_PORT:-3466}:${MCP_PORT:-3466}"
    volumes:
      - store:/app/store
      - ./prompts:/app/prompts:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    secrets:
      - anthropic_auth_token
      - http_api_token
      - encryption_key
    env_file:
      - .env
    environment:
      - SECRETS_DIR=/run/secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${HTTP_PORT:-3200}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 128

volumes:
  store:

secrets:
  anthropic_auth_token:
    file: ${SECRETS_DIR}/anthropic_api_key
  http_api_token:
    file: ${SECRETS_DIR}/carapa_mail_token
  encryption_key:
    file: ${SECRETS_DIR}/encryption_key
