services:
  carapamail:
    build: .
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "${SMTP_PORT:-2525}:${SMTP_PORT:-2525}"   # SMTP proxy
      - "${IMAP_PROXY_PORT:-1993}:${IMAP_PROXY_PORT:-1993}"   # IMAP proxy
      - "${HTTP_PORT:-3200}:${HTTP_PORT:-3200}"   # Admin UI + API
      - "127.0.0.1:${MCP_PORT:-3466}:${MCP_PORT:-3466}" # MCP server (localhost only)
# For debugging:      
      - "127.0.0.1:9229:9229" 
    command: bun --inspect=0.0.0.0:9229 src/index.ts 

    volumes:
      - store:/app/store
      - ./prompts:/app/prompts:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    pids_limit: 128


volumes:
  store: