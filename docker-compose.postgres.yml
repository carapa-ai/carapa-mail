services:
  carapamail:
    build: .
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bind to localhost only — use a reverse proxy for remote access
      - "127.0.0.1:${SMTP_PORT:-2525}:${SMTP_PORT:-2525}"   # SMTP proxy
      - "127.0.0.1:${IMAP_PROXY_PORT:-1993}:${IMAP_PROXY_PORT:-1993}"   # IMAP proxy
      - "127.0.0.1:${HTTP_PORT:-3200}:${HTTP_PORT:-3200}"   # Admin UI + API
      - "127.0.0.1:${MCP_PORT:-3466}:${MCP_PORT:-3466}" # MCP server (uncomment if MCP_ENABLED=true)
    volumes:
      - store:/app/store
      - ./prompts:/app/prompts:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_TYPE: postgres
      DATABASE_URL: postgres://carapamail:${POSTGRES_PASSWORD}@postgres:5432/carapamail
    mem_limit: 512m
    pids_limit: 128

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    # Not exposed to the host — only accessible from carapamail via the internal network
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /run/postgresql:noexec,nosuid,size=16m
    environment:
      POSTGRES_DB: carapamail
      POSTGRES_USER: carapamail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "carapamail"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 256m
    pids_limit: 64

volumes:
  store:
  pgdata:
