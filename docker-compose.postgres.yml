services:
  carapamail:
    build: .
    image: carapamail:latest
    restart: unless-stopped
    init: true
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SMTP_PORT:-2525}:${SMTP_PORT:-2525}"
      - "127.0.0.1:${IMAP_PROXY_PORT:-1993}:${IMAP_PROXY_PORT:-1993}"
      - "127.0.0.1:${HTTP_PORT:-3200}:${HTTP_PORT:-3200}"
      - "127.0.0.1:${MCP_PORT:-3466}:${MCP_PORT:-3466}"
    volumes:
      - store:/app/store
      - ./prompts:/app/prompts:ro
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_TYPE: postgres
      DATABASE_URL: postgres://carapamail:${POSTGRES_PASSWORD}@postgres:5432/carapamail
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${HTTP_PORT:-3200}/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 128

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /run/postgresql:noexec,nosuid,size=16m
    environment:
      POSTGRES_DB: carapamail
      POSTGRES_USER: carapamail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "carapamail"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 64

volumes:
  store:
  pgdata:
